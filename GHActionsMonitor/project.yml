name: GHActionsMonitor
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.mvovchak
  createIntermediateGroups: true
  groupOrdering:
    - pattern: App
      order: [GHActionsMonitorApp.swift, AppDelegate.swift]
    - pattern: Models
    - pattern: Services
    - pattern: Views
    - pattern: Resources

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"

targets:
  GHActionsMonitor:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: GHActionsMonitor
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mvovchak.GHActionsMonitor
      INFOPLIST_FILE: GHActionsMonitor/Info.plist
      CODE_SIGN_ENTITLEMENTS: GHActionsMonitor/GHActionsMonitor.entitlements
      SWIFT_VERSION: "5.9"
      ENABLE_HARDENED_RUNTIME: YES
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
